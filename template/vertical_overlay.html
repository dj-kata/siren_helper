<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIREN6 Vertical Overlay</title>
<style>
:root {
  --top-height: 300px;
  --splitter-size: 8px;
  --bg: transparent;
  --splitter-color: rgba(255, 255, 255, 0.2);
  --splitter-active-color: rgba(105, 219, 124, 0.72);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
}

.stack {
  width: 100vw;
  height: 100vh;
  display: grid;
  grid-template-rows: var(--top-height) var(--splitter-size) minmax(0, 1fr);
  background: var(--bg);
}

.panel {
  width: 100%;
  height: 100%;
  display: block;
  border: 0;
  background: transparent;
}

.splitter {
  width: 100%;
  height: var(--splitter-size);
  border: 0;
  padding: 0;
  background: var(--splitter-color);
  cursor: row-resize;
  touch-action: none;
}

.splitter:hover,
.splitter.dragging {
  background: var(--splitter-active-color);
}

body.dragging {
  cursor: row-resize;
  user-select: none;
}

body.dragging .panel {
  pointer-events: none;
}
</style>
</head>
<body>
<main class="stack">
  <iframe class="panel" id="monster-icons" title="Monster Icons"></iframe>
  <button class="splitter" id="splitter" type="button" aria-label="上下フレームの高さを変更"></button>
  <iframe class="panel" id="shop-price-candidates" title="Shop Price Candidates"></iframe>
</main>

<script>
const params = new URLSearchParams(location.search);

function applyCssSizeParam(paramName, propertyName) {
  const value = params.get(paramName);
  if (!value) return;
  document.documentElement.style.setProperty(propertyName, normalizeCssSize(value));
}

function normalizeCssSize(value) {
  const trimmed = value.trim();
  if (!trimmed) return "";
  return /^-?\d+(\.\d+)?$/.test(trimmed) ? `${trimmed}px` : trimmed;
}

function buildFrameUrl(fileName) {
  const childParams = new URLSearchParams(params);
  childParams.delete("topHeight");
  childParams.delete("splitterSize");
  const query = childParams.toString();
  return query ? `${fileName}?${query}` : fileName;
}

applyCssSizeParam("topHeight", "--top-height");
applyCssSizeParam("splitterSize", "--splitter-size");

document.getElementById("monster-icons").src = buildFrameUrl("monster_icons.html");
document.getElementById("shop-price-candidates").src = buildFrameUrl("shop_price_candidates.html");

const splitter = document.getElementById("splitter");
let dragging = false;

function setTopHeight(clientY) {
  const minTop = 80;
  const minBottom = 80;
  const splitterSize = splitter.getBoundingClientRect().height;
  const maxTop = Math.max(minTop, window.innerHeight - splitterSize - minBottom);
  const nextHeight = Math.min(Math.max(clientY, minTop), maxTop);
  document.documentElement.style.setProperty("--top-height", `${Math.round(nextHeight)}px`);
}

splitter.addEventListener("pointerdown", (event) => {
  dragging = true;
  splitter.classList.add("dragging");
  document.body.classList.add("dragging");
  splitter.setPointerCapture(event.pointerId);
  setTopHeight(event.clientY);
});

splitter.addEventListener("pointermove", (event) => {
  if (!dragging) return;
  setTopHeight(event.clientY);
});

function stopDragging(event) {
  if (!dragging) return;
  dragging = false;
  splitter.classList.remove("dragging");
  document.body.classList.remove("dragging");
  if (splitter.hasPointerCapture(event.pointerId)) {
    splitter.releasePointerCapture(event.pointerId);
  }
}

splitter.addEventListener("pointerup", stopDragging);
splitter.addEventListener("pointercancel", stopDragging);
</script>
</body>
</html>
